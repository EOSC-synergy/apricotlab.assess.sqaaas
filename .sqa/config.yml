config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/grycap/apricotlab:
      branch: main
      repo: https://github.com/grycap/apricotlab/
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/grycap/apricotlab git:
        commands:
        - /usr/bin/env sh .sqa/script.hasty-chocolate-sheep.sh
        container: qc.acc_droopy-khaki-burmese
  QC.Doc:
    repos:
      github.com/grycap/apricotlab find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.hasty-amethyst-beaver.sh
        container: qc.doc_surly-crimson-zonkey
      github.com/grycap/apricotlab git:
        commands:
        - /usr/bin/env sh .sqa/script.breezy-rose-jackal.sh
        container: qc.doc_beady-ivory-lemming
      github.com/grycap/apricotlab markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.seedy-amethyst-scorpion.sh
        container: qc.doc_pasty-flax-chimpanzee
  QC.Lic:
    repos:
      github.com/grycap/apricotlab licensee:
        commands:
        - /usr/bin/env sh .sqa/script.cloudy-silver-lynx.sh
        container: qc.lic_silly-ultramarine-peccary
  QC.Met:
    repos:
      github.com/grycap/apricotlab validate_codemeta:
        commands:
        - /usr/bin/env sh .sqa/script.ugly-chocolate-snail.sh
        container: qc.met_clammy-pear-wolf
  QC.Sec:
    repos:
      github.com/grycap/apricotlab bandit:
        commands:
        - /usr/bin/env sh .sqa/script.smelly-saffron-fossa.sh
        container: qc.sec_skanky-green-shrimp
  QC.Sty:
    repos:
      github.com/grycap/apricotlab flake8:
        commands:
        - /usr/bin/env sh .sqa/script.hilly-ultramarine-ibis.sh
        container: qc.sty_randy-lavender-squirt
      github.com/grycap/apricotlab hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.homely-cornflower-rattlesnake.sh
        container: qc.sty_chummy-wisteria-akita
      github.com/grycap/apricotlab jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.foggy-platinum-burmese.sh
        container: qc.sty_stuffy-chestnut-seal
      github.com/grycap/apricotlab pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.gloppy-pink-eel.sh
        container: qc.sty_ugly-white-numbat
  QC.Uni:
    repos:
      github.com/grycap/apricotlab pytest:
        commands:
        - /usr/bin/env sh .sqa/script.scaly-ultramarine-rabbit.sh
        container: qc.uni_tacky-amber-cuttlefish
  QC.Ver:
    repos:
      github.com/grycap/apricotlab get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.lovely-white-quail.sh
        container: qc.ver_whiny-myrtle-tapir
timeout: 5400
