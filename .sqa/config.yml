config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/grycap/apricotlab:
      branch: main
      repo: https://github.com/grycap/apricotlab/
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/grycap/apricotlab git:
        commands:
        - /usr/bin/env sh .sqa/script.breezy-yellow-abyssinian.sh
        container: qc.acc_foggy-sepia-worm
  QC.Doc:
    repos:
      github.com/grycap/apricotlab find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.snappy-amber-ocelot.sh
        container: qc.doc_frumpy-seashell-sheepdog
      github.com/grycap/apricotlab git:
        commands:
        - /usr/bin/env sh .sqa/script.messy-chestnut-mandrill.sh
        container: qc.doc_lumpy-peach-setter
      github.com/grycap/apricotlab markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.gamy-amber-hamster.sh
        container: qc.doc_paltry-puce-alligator
  QC.Lic:
    repos:
      github.com/grycap/apricotlab licensee:
        commands:
        - /usr/bin/env sh .sqa/script.flaky-aquamarine-hyrax.sh
        container: qc.lic_frumpy-myrtle-lemur
  QC.Met:
    repos:
      github.com/grycap/apricotlab validate_codemeta:
        commands:
        - /usr/bin/env sh .sqa/script.wheezy-cinnamon-molly.sh
        container: qc.met_muggy-rose-fowl
  QC.Sec:
    repos:
      github.com/grycap/apricotlab bandit:
        commands:
        - /usr/bin/env sh .sqa/script.bluesy-magenta-balinese.sh
        container: qc.sec_chewy-buff-bandicoot
  QC.Sty:
    repos:
      github.com/grycap/apricotlab flake8:
        commands:
        - /usr/bin/env sh .sqa/script.leaky-ochre-mayfly.sh
        container: qc.sty_nippy-jade-beetle
      github.com/grycap/apricotlab hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.muggy-chestnut-chamois.sh
        container: qc.sty_muzzy-dandelion-wrasse
      github.com/grycap/apricotlab jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.wheezy-platinum-eagle.sh
        container: qc.sty_boozy-celadon-sloth
      github.com/grycap/apricotlab pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.slaphappy-lime-husky.sh
        container: qc.sty_paltry-maroon-spoonbill
  QC.Uni:
    repos:
      github.com/grycap/apricotlab pytest:
        commands:
        - /usr/bin/env sh .sqa/script.greasy-ruby-beetle.sh
        container: qc.uni_craggy-denim-mammoth
  QC.Ver:
    repos:
      github.com/grycap/apricotlab get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.slaphappy-beige-fowl.sh
        container: qc.ver_droopy-black-wolf
timeout: 5400
