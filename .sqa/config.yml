config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/grycap/apricotlab:
      branch: main
      repo: https://github.com/grycap/apricotlab/
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/grycap/apricotlab git:
        commands:
        - /usr/bin/env sh .sqa/script.skimpy-wheat-stoat.sh
        container: qc.acc_slaphappy-jade-molly
  QC.Doc:
    repos:
      github.com/grycap/apricotlab find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.messy-harlequin-cassowary.sh
        container: qc.doc_leaky-teal-chow
      github.com/grycap/apricotlab git:
        commands:
        - /usr/bin/env sh .sqa/script.chummy-chocolate-walrus.sh
        container: qc.doc_pokey-goldenrod-labradoodle
      github.com/grycap/apricotlab markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.cranky-white-zebu.sh
        container: qc.doc_sleepy-turquoise-rabbit
  QC.Lic:
    repos:
      github.com/grycap/apricotlab licensee:
        commands:
        - /usr/bin/env sh .sqa/script.hasty-coral-crocodile.sh
        container: qc.lic_paltry-myrtle-shrimp
  QC.Met:
    repos:
      github.com/grycap/apricotlab validate_codemeta:
        commands:
        - /usr/bin/env sh .sqa/script.blurry-platinum-nightingale.sh
        container: qc.met_snoopy-magnolia-bracke
  QC.Sec:
    repos:
      github.com/grycap/apricotlab bandit:
        commands:
        - /usr/bin/env sh .sqa/script.trippy-rose-fly.sh
        container: qc.sec_nippy-blue-frigatebird
  QC.Sty:
    repos:
      github.com/grycap/apricotlab flake8:
        commands:
        - /usr/bin/env sh .sqa/script.stealthy-yellow-bandicoot.sh
        container: qc.sty_randy-chocolate-flamingo
      github.com/grycap/apricotlab hadolint:
        commands:
        - /usr/bin/env sh .sqa/script.smelly-cerise-woodlouse.sh
        container: qc.sty_boozy-olive-elephant
      github.com/grycap/apricotlab jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.squirrely-fuchsia-wallaby.sh
        container: qc.sty_hazy-corn-alligator
      github.com/grycap/apricotlab pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.gamy-firebrick-mouse.sh
        container: qc.sty_ugly-cornflower-booby
  QC.Uni:
    repos:
      github.com/grycap/apricotlab pytest:
        commands:
        - /usr/bin/env sh .sqa/script.lumpy-gamboge-crocodile.sh
        container: qc.uni_seedy-flax-jackal
  QC.Ver:
    repos:
      github.com/grycap/apricotlab get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.surly-cinnamon-cheetah.sh
        container: qc.ver_smelly-lime-caiman
timeout: 5400
